<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title> K-Win </title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="data:application/manifest+json;base64,eyJuYW1lIjoiSy1XaW4gQWRtaW4iLCJzaG9ydF9uYW1lIjoiSy1XaW4iLCJzdGFydF91cmwiOiIuL2luZGV4Lmh0bWwiLCJkaXNwbGF5Ijoic3RhbmRhbG9uZSIsImJhY2tncm91bmRfY29sb3ciOiIjMDAwMDAwIiwidGhlbWVfY29sb3ciOiIjZmZkYTAwIiwib3JpZW50YXRpb24iOiJwb3J0cmFpdCIsImljb25zIjpbeyJzcmMiOiJsb2dvLmpwZWciLCJzaXplcyI6IjUxMng1MTIiLCJ0eXBlIjoiaW1hZ2UvanBlZyIsInB1cnBvc2UiOiJhbnkgbWFza2FibGUifV19">
    
    <style>
        :root { 
            --accent: #ffda00;
            --bg: #000000;
            --card: #121212;
            --text: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden;
        }

        /* Mobile Status Bar Padding */
        .safe-area { padding-top: env(safe-area-inset-top); width: 100%; }

        /* Install Bar - Only shows when not installed */
        #install-banner {
            display: none; width: 100%; background: var(--accent); color: #000;
            padding: 12px 20px; justify-content: space-between; align-items: center;
            font-weight: bold; position: fixed; top: 0; z-index: 9999;
            box-shadow: 0 4px 15px rgba(255, 218, 0, 0.4);
        }
        #install-banner button {
            background: #000; color: var(--accent); border: none;
            padding: 8px 15px; border-radius: 8px; font-weight: 900;
        }

        .header {
            text-align: center; margin-top: 40px; margin-bottom: 20px;
        }
        .logo-circle {
            width: 110px; height: 110px; border-radius: 50%;
            border: 4px solid var(--accent); padding: 5px;
            margin: 0 auto 15px; box-shadow: 0 0 25px rgba(255, 218, 0, 0.2);
        }
        .logo-circle img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        h1 { margin: 0; font-size: 1.8rem; letter-spacing: 2px; color: var(--accent); }
        .subtitle { font-size: 0.7rem; letter-spacing: 4px; opacity: 0.6; text-transform: uppercase; }

        .container {
            width: 90%; max-width: 400px; flex: 1; display: flex; flex-direction: column; gap: 15px;
        }

        .card {
            background: var(--card); border-radius: 30px; padding: 25px;
            border: 1px solid #222; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.75rem; color: var(--accent); font-weight: bold; margin-bottom: 10px; text-transform: uppercase; }
        
        input {
            width: 100%; background: #000; border: 2px solid #333;
            border-radius: 20px; color: var(--accent); padding: 18px;
            font-size: 2rem; font-weight: bold; text-align: center;
            transition: 0.3s;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(255, 218, 0, 0.2); }

        .btn {
            width: 100%; padding: 18px; border-radius: 20px; border: none;
            font-size: 1rem; font-weight: bold; display: flex; align-items: center;
            justify-content: center; gap: 10px; margin-bottom: 12px;
            transition: 0.2s; cursor: pointer;
        }
        .btn:active { transform: scale(0.96); }

        .btn-save { background: var(--accent); color: #000; }
        .btn-wa { background: #25D366; color: #fff; }
        .btn-sms { background: #1d9bf0; color: #fff; }

        .footer { margin-bottom: 30px; font-size: 0.75rem; opacity: 0.4; text-align: center; }

        /* Animation for Banner */
        @keyframes slideIn { from { transform: translateY(-100%); } to { transform: translateY(0); } }
        .slide-in { animation: slideIn 0.5s ease forwards; }

    </style>
</head>
<body>

    <div id="install-banner">
        <span>📲 K-Win App එක දාගන්න</span>
        <button id="btn-install">INSTALL</button>
    </div>

    <div class="safe-area"></div>

    <div class="header">
        <div class="logo-circle">
            <img src="https://github.com/kwinproduction/K-Win-Ecard/main/logo.jpeg" alt="Logo">
        </div>
        <h1>K-WIN</h1>
        <div class="subtitle">Management System</div>
    </div>

    <div class="container">
        <div class="card">
            <div class="input-group">
                <label>Enter Mobile Number</label>
                <input type="tel" id="phone" placeholder="07XXXXXXXX" maxlength="10">
            </div>

            <button class="btn btn-save" onclick="saveContact()">
                <span>👤</span> Save to Contacts
            </button>
            <button class="btn btn-wa" onclick="sendAction('wa')">
                <span>💬</span> WhatsApp Link
            </button>
            <button class="btn btn-sms" onclick="sendAction('sms')">
                <span>✉️</span> Direct SMS
            </button>
        </div>
    </div>

  <div class="footer">

        Powered by <b>K-Win</b> | Design by Janith Didula

    </div>

    <script>
        // 1. Service Worker Register කිරීම (PWA සඳහා අනිවාර්යයි)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
            .then(() => console.log("Service Worker Registered"));
        }

        // 2. දැනටමත් Install කරලා නම් බැනර් එක පෙන්නන්න එපා
        if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
            document.getElementById('install-banner').style.display = 'none';
        }

        // 3. PWA Install Logic
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            const banner = document.getElementById('install-banner');
            banner.style.display = 'flex';
            banner.classList.add('slide-in');
        });

        document.getElementById('btn-install').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    document.getElementById('install-banner').style.display = 'none';
                }
                deferredPrompt = null;
            }
        });

        // 4. Contact Save කිරීම (Auto-save/VCF)
        function saveContact() {
            const num = document.getElementById('phone').value.trim();
            if (num.length < 10) return alert("අංකය නිවැරදිව ඇතුළත් කරන්න");

            const vcard = `BEGIN:VCARD\nVERSION:3.0\nFN:K-Win Client ${num}\nTEL;TYPE=CELL:${num}\nEND:VCARD`;
            const blob = new Blob([vcard], { type: "text/vcard" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `KWin_${num}.vcf`;
            a.click();
        }

        // 5. WhatsApp & SMS Logic
        const link = "https://janithdidula025-design.github.io/ecard/index.html";
        const msg = `ඔබේ K-Win Digital Card එක මෙතැනින් ලබාගන්න: ${link}`;

        function sendAction(type) {
            let num = document.getElementById('phone').value.trim();
            if (num.length < 10) return alert("අංකය නිවැරදිව ඇතුළත් කරන්න");

            // Convert to 94 format
            if (num.startsWith('0')) num = '94' + num.substring(1);

            if (type === 'wa') {
                window.location.href = `https://wa.me/${num}?text=${encodeURIComponent(msg)}`;
            } else {
                const sep = (navigator.userAgent.match(/iPhone|iPad|iPod/i)) ? '&' : '?';
                window.location.href = `sms:+${num}${sep}body=${encodeURIComponent(msg)}`;
            }
        }
    </script>
</body>
</html>
