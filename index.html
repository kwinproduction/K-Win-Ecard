<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>K-Win</title>

    <style>
        :root { 
            --accent: #ffda00;
            --bg: #000000;
            --card: #121212;
            --text: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden;
        }

        /* Install Bar - Always on top for visibility */
        #install-banner {
            display: none; 
            width: 100%; background: var(--accent); color: #000;
            padding: 12px 20px; justify-content: space-between; align-items: center;
            font-weight: bold; position: fixed; top: 0; z-index: 9999;
            box-shadow: 0 4px 15px rgba(255, 218, 0, 0.4);
        }
        #install-banner button {
            background: #000; color: var(--accent); border: none;
            padding: 8px 15px; border-radius: 8px; font-weight: 900; cursor: pointer;
        }

        .lang-bar { 
            display: flex; gap: 8px; margin-top: 70px; z-index: 10; 
            background: #111; padding: 5px; border-radius: 25px; border: 1px solid #222;
        }
        .lang-btn {
            background: transparent; color: #888; border: none; padding: 10px 18px;
            border-radius: 20px; font-size: 0.8rem; cursor: pointer; transition: 0.3s;
            font-weight: bold;
        }
        .lang-btn.active { background: var(--accent); color: #000; }

        .header { text-align: center; margin-top: 20px; margin-bottom: 20px; }
        .logo-circle {
            width: 110px; height: 110px; border-radius: 50%;
            border: 4px solid var(--accent); padding: 5px;
            margin: 0 auto 15px; background: #000; overflow: hidden;
        }
        .logo-circle img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        h1 { margin: 0; font-size: 1.8rem; letter-spacing: 2px; color: var(--accent); font-weight: 900; }
        .subtitle { font-size: 0.7rem; letter-spacing: 4px; opacity: 0.6; text-transform: uppercase; margin-top: 5px; }

        .container { width: 90%; max-width: 400px; margin-top: 10px; }
        .card {
            background: var(--card); border-radius: 30px; padding: 25px;
            border: 1px solid #222; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.75rem; color: var(--accent); font-weight: bold; margin-bottom: 10px; text-align: center; }
        
        input {
            width: 100%; background: #000; border: 2px solid #333;
            border-radius: 20px; color: var(--accent); padding: 18px;
            font-size: 2rem; font-weight: bold; text-align: center; transition: 0.3s;
        }
        input:focus { border-color: var(--accent); }

        .btn {
            width: 100%; padding: 18px; border-radius: 20px; border: none;
            font-size: 1rem; font-weight: bold; display: flex; align-items: center;
            justify-content: center; gap: 10px; margin-bottom: 12px; cursor: pointer;
        }
        .btn-save { background: var(--accent); color: #000; }
        .btn-wa { background: #25D366; color: #fff; }
        .btn-sms { background: #1d9bf0; color: #fff; }
        .btn:active { transform: scale(0.96); }

        .footer { margin-top: auto; padding: 30px 10px; font-size: 0.75rem; opacity: 0.4; text-align: center; line-height: 1.5; }
    </style>
</head>
<body>

    <div id="install-banner">
        <span id="txt-install-msg">📲 Install K-Win App</span>
        <button id="btn-install">INSTALL</button>
    </div>

    <div class="lang-bar">
        <button id="btn-en" class="lang-btn active" onclick="setLang('en')">English</button>
        <button id="btn-si" class="lang-btn" onclick="setLang('si')">සිංහල</button>
        <button id="btn-ta" class="lang-btn" onclick="setLang('ta')">தமிழ்</button>
    </div>

    <div class="header">
        <div class="logo-circle">
            <img src="https://raw.githubusercontent.com/kwinproduction/K-Win-Ecard/main/logo.jpeg" alt="Logo">
        </div>
        <h1>K-WIN</h1>
        <div id="txt-subtitle" class="subtitle">Management System</div>
    </div>

    <div class="container">
        <div class="card">
            <div class="input-group">
                <label id="lbl-phone">ENTER MOBILE NUMBER</label>
                <input type="tel" id="phone" placeholder="07XXXXXXXX" maxlength="10">
            </div>

            <button class="btn btn-save" onclick="saveContact()">
                <span id="btn-save-txt">👤 Save to Contacts</span>
            </button>
            <button class="btn btn-wa" onclick="sendAction('wa')">
                <span id="btn-wa-txt">💬 WhatsApp</span>
            </button>
            <button class="btn btn-sms" onclick="sendAction('sms')">
                <span id="btn-sms-txt">✉️ SMS</span>
            </button>
        </div>
    </div>

    <div class="footer" id="txt-footer">
        Powered by K-Win | Design by Janith Didula
    </div>

    <script>
        const langData = {
            en: {
                install: "📲 Install K-Win App", installBtn: "INSTALL", subtitle: "Management System",
                label: "ENTER MOBILE NUMBER", save: "👤 Save to Contacts", wa: "💬 WhatsApp",
                sms: "✉️ SMS", footer: "Powered by K-Win | Design by Janith Didula",
                alert: "Please enter a valid number", vcardName: "K-Win Client",
                smsMsg: "Get your K-Win Digital Card here:"
            },
            si: {
                install: "📲 K-Win ඇප් එක ලබාගන්න", installBtn: "පිහිටුවන්න", subtitle: "කළමනාකරණ පද්ධතිය",
                label: "දුරකථන අංකය ඇතුළත් කරන්න", save: "👤 සම්බන්ධතාවලට එක් කරන්න", wa: "💬 WhatsApp",
                sms: "✉️ SMS", footer: "බලය ගැන්වීම K-Win | නිර්මාණය ජනිත් දිදුල",
                alert: "කරුණාකර නිවැරදි අංකයක් ඇතුළත් කරන්න", vcardName: "K-Win සේවාලාභියා",
                smsMsg: "ඔබේ K-Win Digital Card එක මෙතැනින් ලබාගන්න:"
            },
            ta: {
                install: "📲 K-Win செயலியை நிறுவவும்", installBtn: "நிறுவவும்", subtitle: "மேலாண்மை அமைப்பு",
                label: "கைபேசி எண்ணை உள்ளிடவும்", save: "👤 தொடர்புகளில் சேமிக்கவும்", wa: "💬 WhatsApp",
                sms: "✉️ SMS", footer: "K-Win மூலம் இயக்கப்படுகிறது | නිර්මාණය ජනිත් දිදුල",
                alert: "செல்லுபடியாகும் எண்ணை உள்ளிடவும்", vcardName: "K-Win கிளையண்ட்",
                smsMsg: "உங்கள் K-Win டிஜிட்டல் கார்டை இங்கே பெறுங்கள்:"
            }
        };

        let currentLang = 'en';
        let deferredPrompt;
        const installBanner = document.getElementById('install-banner');

        function setLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + lang).classList.add('active');
            document.getElementById('txt-install-msg').innerText = langData[lang].install;
            document.getElementById('btn-install').innerText = langData[lang].installBtn;
            document.getElementById('txt-subtitle').innerText = langData[lang].subtitle;
            document.getElementById('lbl-phone').innerText = langData[lang].label;
            document.getElementById('btn-save-txt').innerText = langData[lang].save;
            document.getElementById('btn-wa-txt').innerText = langData[lang].wa;
            document.getElementById('btn-sms-txt').innerText = langData[lang].sms;
            document.getElementById('txt-footer').innerText = langData[lang].footer;
        }

        // --- Integrated PWA Logic ---
        if (!window.matchMedia('(display-mode: standalone)').matches) {
            installBanner.style.display = 'flex';
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBanner.style.display = 'flex'; 
        });

        document.getElementById('btn-install').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') installBanner.style.display = 'none';
                deferredPrompt = null;
            } else {
                const msg = currentLang === 'si' ? 
                    "Browser එකේ Menu එකට (තිත් 3) ගොස් 'Install App' හෝ 'Add to Home Screen' තෝරන්න." : 
                    "Go to Browser Menu (3 dots) and select 'Install App' or 'Add to Home Screen'.";
                alert(msg);
            }
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW error:', err));
            });
        }

        // --- Functions ---
        function saveContact() {
            const num = document.getElementById('phone').value.trim();
            if (num.length < 10) return alert(langData[currentLang].alert);
            const name = langData[currentLang].vcardName;
            const vcard = `BEGIN:VCARD\nVERSION:3.0\nFN:${name}\nTEL;TYPE=CELL:${num}\nEND:VCARD`;
            const blob = new Blob([vcard], { type: "text/vcard" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `KWin_${num}.vcf`;
            a.click();
        }

        function sendAction(type) {
            let num = document.getElementById('phone').value.trim();
            if (num.length < 10) return alert(langData[currentLang].alert);
            if (num.startsWith('0')) num = '94' + num.substring(1);
            const link = "https://kwinproduction.github.io/K-Win-Ecard/";
            const msg = `${langData[currentLang].smsMsg} ${link}`;
            if (type === 'wa') {
                window.location.href = `https://wa.me/${num}?text=${encodeURIComponent(msg)}`;
            } else {
                const sep = (navigator.userAgent.match(/iPhone|iPad|iPod/i)) ? '&' : '?';
                window.location.href = `sms:+${num}${sep}body=${encodeURIComponent(msg)}`;
            }
        }

        window.onload = () => setLang('en');
    </script>
</body>
</html>
