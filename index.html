<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>K-Win</title>

  <link rel="manifest" href="data:application/manifest+json;base64,eyJuYW1lIjoiS1dpbiIsInNob3J0X25hbWUiOiJLLVdpbiIsInN0YXJ0X3VybCI6ImluZGV4Lmh0bWwiLCJkaXNwbGF5Ijoic3RhbmRhbG9uZSIsImJhY2tncm91bmRfY29sb3IiOiIjMDAwMDAwIiwidGhlbWVfY29sb3IiOiIjZmZmZmZmIiwib3JpZW50YXRpb24iOiJwb3J0cmFpdCIsImljb25zIjpbeyJzcmMiOiJodHRwczovL3Jhdy5naXRodWJ1c2VyY29udGVudC5jb20va3dpbnByb2R1Y3Rpb24vSy1XaW4tRWNhcmQvbWFpbi9sb2dvLmpwZWciLCJzaXplcyI6IjUxMng1MTIiLCJ0eXBlIjoiaW1hZ2UvanBlZyIsInB1cnBvc2UiOiJhbnkgbWFza2FibGUifV19" />
  <link rel="icon" type="image/jpeg" href="https://raw.githubusercontent.com/kwinproduction/K-Win-Ecard/main/logo.jpeg" />
  <meta name="theme-color" content="#000000" />
  <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/kwinproduction/K-Win-Ecard/main/logo.jpeg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <style>
    :root {
      --accent: #ffffff;
      --bg: #000000;
      --card: #121212;
      --text: #ffffff;
      --gold: #ffcc00;
      --border: #222222;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', Roboto, sans-serif;
      position: fixed;
      inset: 0;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: env(safe-area-inset-top) 15px env(safe-area-inset-bottom) 15px;
      background-size: cover;
      background-position: center;
    }

    #install-banner {
      display: none;
      width: 100%;
      background: var(--accent);
      color: #000;
      padding: 12px 20px;
      justify-content: space-between;
      align-items: center;
      font-weight: 700;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 9999;
      box-shadow: 0 4px 15px rgba(255,255,255,0.1);
    }

    #install-banner button {
      background: #000;
      color: var(--accent);
      border: none;
      padding: 8px 18px;
      border-radius: 10px;
      font-weight: 900;
      cursor: pointer;
    }

    #ios-instructions {
      display: none;
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.98);
      z-index: 100000;
      color: white;
      padding: 30px;
      text-align: center;
      justify-content: center;
      flex-direction: column;
      align-items: center;
      backdrop-filter: blur(20px);
    }

    .instruction-step {
      background: rgba(255, 255, 255, 0.05);
      padding: 18px;
      border-radius: 15px;
      margin: 12px 0;
      width: 100%;
      font-size: 15px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .highlight-gold {
      color: var(--gold);
      font-weight: bold;
    }

    .lang-bar {
      display: flex;
      gap: 8px;
      margin-top: 60px;
      background: #111;
      padding: 5px;
      border-radius: 25px;
      border: 1px solid var(--border);
    }

    .lang-btn {
      background: transparent;
      color: #888;
      border: none;
      padding: 8px 15px;
      border-radius: 20px;
      font-size: 0.75rem;
      cursor: pointer;
      font-weight: bold;
    }

    .lang-btn.active {
      background: var(--accent);
      color: #000;
    }

    .header {
      text-align: center;
      margin-top: 10px;
    }

    .logo-circle {
      width: 85px;
      height: 85px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      padding: 4px;
      margin: 0 auto 10px;
      overflow: hidden;
    }

    .logo-circle img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }

    h1 {
      font-size: 1.4rem;
      letter-spacing: 2px;
      color: var(--accent);
      font-weight: 900;
    }

    .container {
      width: 100%;
      max-width: 380px;
      flex-grow: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: var(--card);
      border-radius: 30px;
      padding: 25px;
      border: 1px solid var(--border);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      width: 100%;
      max-height: 95vh;
      overflow-y: auto;
      scrollbar-width: none;
    }

    .card::-webkit-scrollbar {
      display: none;
    }

    .input-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      font-size: 0.7rem;
      color: var(--accent);
      font-weight: bold;
      margin-bottom: 8px;
      text-align: center;
      opacity: 0.8;
    }

    input, textarea {
      width: 100%;
      background: #000;
      border: 1px solid #333;
      border-radius: 15px;
      color: var(--accent);
      padding: 12px;
      font-size: 1.05rem;
      font-weight: bold;
      text-align: center;
      outline: none;
    }

    input#phone {
      font-size: 1.35rem;
      letter-spacing: 2px;
    }

    .btn-stack {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 10px;
    }

    .btn {
      width: 100%;
      padding: 15px;
      border-radius: 15px;
      border: none;
      font-size: 0.9rem;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      transition: transform 0.1s ease;
    }

    .btn-save { background: var(--accent); color: #000; }
    .btn-wa { background: #25D366; color: #fff; }
    .btn-sms { background: #1d9bf0; color: #fff; }
    .btn:active { transform: scale(0.95); }

    .footer {
      margin-top: 20px;
      padding-bottom: 10px;
      font-size: 0.6rem;
      opacity: 0.4;
      text-align: center;
      width: 100%;
      color: #fff;
    }

    .notification-popup {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.92);
      z-index: 99999;
      justify-content: center;
      align-items: center;
      padding: 20px;
      backdrop-filter: blur(10px);
    }

    .notification-box {
      width: 100%;
      max-width: 350px;
      background: #111;
      border: 1px solid #333;
      border-radius: 25px;
      padding: 20px;
      box-shadow: 0 0 30px rgba(255,255,255,0.08);
      animation: popup 0.25s ease;
    }

    .notification-title {
      text-align: center;
      margin-bottom: 20px;
      font-size: 22px;
      color: #fff;
    }

    .notification-textarea {
      width: 100%;
      height: 140px;
      background: #000;
      border: 1px solid #333;
      border-radius: 15px;
      padding: 15px;
      color: #fff;
      font-size: 15px;
      resize: none;
      outline: none;
      text-align: left;
    }

    .notification-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .close-btn, .send-btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 15px;
      color: #fff;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
    }

    .close-btn { background: #222; }
    .send-btn { background: #25D366; }

    @keyframes popup {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="install-banner">
    <span id="txt-install-msg">📲 Install K-Win App</span>
    <button id="btn-install" onclick="handleInstallClick()">INSTALL</button>
  </div>

  <div id="ios-instructions">
    <h2 id="ios-title" style="color: #ffcc00; margin-bottom: 20px;">Add to Home Screen</h2>
    <div id="ios-steps-container"></div>
    <button class="btn btn-save" style="margin-top: 30px; width: auto; padding: 12px 45px;" onclick="document.getElementById('ios-instructions').style.display='none'">සම්පූර්ණයි ✅</button>
  </div>

  <div class="lang-bar">
    <button id="btn-en" class="lang-btn active" onclick="setLang('en')">English</button>
    <button id="btn-si" class="lang-btn" onclick="setLang('si')">සිංහල</button>
    <button id="btn-ta" class="lang-btn" onclick="setLang('ta')">தமிழ்</button>
  </div>

  <div class="header">
    <div class="logo-circle">
      <img src="https://raw.githubusercontent.com/kwinproduction/K-Win-Ecard/main/logo.jpeg" alt="Logo" />
    </div>
    <h1>Kind Win</h1>
  </div>

  <div class="container">
    <div class="card">
      <div class="input-group">
        <label id="lbl-phone">ENTER MOBILE NUMBER</label>
        <input type="tel" id="phone" placeholder="07XXXXXXXX" maxlength="10" />
      </div>

      <div class="input-group">
        <label id="lbl-name">ENTER NAME</label>
        <input type="text" id="u-name" placeholder="Name" />
      </div>

      <div class="btn-stack">
        <button class="btn btn-save" onclick="saveContact()"><span id="btn-save-txt">👤 Save to Contacts</span></button>
        <button class="btn btn-wa" onclick="sendAction('wa')"><span id="btn-wa-txt">💬 Send WhatsApp</span></button>
        <button class="btn btn-sms" onclick="sendAction('sms')"><span id="btn-sms-txt">✉️ Send SMS</span></button>
        <button class="btn btn-save" onclick="openNotificationPopup()"><span id="btn-notify-txt">🔔 Send Notification</span></button>
      </div>
    </div>
  </div>

  <div class="footer" id="txt-footer">Powered by K-Win | Design by Janith Didula</div>

  <div id="notification-popup" class="notification-popup">
    <div class="notification-box">
      <h2 class="notification-title">🔔 Notification</h2>
      <textarea id="notify-message" class="notification-textarea" placeholder="Type message..."></textarea>
      <div class="notification-actions">
        <button class="close-btn" onclick="closeNotificationPopup()">❌ Close</button>
        <button class="send-btn" onclick="sendNotification()">🚀 Send</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const langData = {
      en: {
        install: "📲 Install K-Win App",
        installBtn: "INSTALL",
        label: "ENTER MOBILE NUMBER",
        nameLabel: "ENTER NAME",
        save: "👤 Save to Contacts",
        wa: "💬 Send WhatsApp",
        sms: "✉️ Send SMS",
        notify: "🔔 Send Notification",
        alert: "Please enter a valid number",
        vcardName: "K-Win Client",
        smsMsg: "Get your K-Win Digital Card here:",
        footer: "Powered by K-Win | Design by Janith Didula"
      },
      si: {
        install: "📲 Shortcut එකක් සාදාගන්න",
        installBtn: "INSTALL",
        label: "දුරකථන අංකය ඇතුළත් කරන්න",
        nameLabel: "නම ඇතුළත් කරන්න",
        save: "👤 සම්බන්ධතාවලට එක් කරන්න",
        wa: "💬 WhatsApp පණිවිඩයක් යවන්න",
        sms: "✉️ SMS එකක් යවන්න",
        notify: "🔔 දැනුම්දීම යවන්න",
        alert: "කරුණාකර නිවැරදි අංකයක් ඇතුළත් කරන්න",
        vcardName: "K-Win සේවාලාභියා",
        smsMsg: "ඔබේ K-Win Digital Card එක මෙතැනින් ලබාගන්න:",
        footer: "K-Win වෙතින් | ජනිත් දිදුලගේ නිර්මාණයකි"
      },
      ta: {
        install: "📲 குறுக்குவழியை உருவாக்கவும்",
        installBtn: "நிறுவவும்",
        label: "கைபேசி எண்ணை உள்ளிடவும்",
        nameLabel: "பெயரை உள்ளிடவும்",
        save: "👤 தொடர்புகளில் சேமிக்கவும்",
        wa: "💬 WhatsApp அனுப்பவும்",
        sms: "✉️ SMS அனுப்பவும்",
        notify: "🔔 அறிவிப்பை அனுப்பு",
        alert: "செல்லுபடியாகும் எண்ணை உள்ளிடவும்",
        vcardName: "K-Win கிளையண்ட்",
        smsMsg: "உங்கள் K-Win டிஜிட்டல் கார்டை இங்கே பெறுங்கள்:",
        footer: "K-Win மூலம் இயக்கப்படுகிறது | வடிவமைப்பு: ஜனித் திதுல"
      }
    };

    let currentLang = 'en';
    let deferredPrompt = null;
    let supabaseClient = null;

    function setLang(lang) {
      currentLang = lang;

      document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
      const activeBtn = document.getElementById('btn-' + lang);
      if (activeBtn) activeBtn.classList.add('active');

      const updateText = (id, text) => {
        const el = document.getElementById(id);
        if (el) el.innerText = text;
      };

      updateText('txt-install-msg', langData[lang].install);
      updateText('btn-install', langData[lang].installBtn);
      updateText('lbl-phone', langData[lang].label);
      updateText('lbl-name', langData[lang].nameLabel);
      updateText('btn-save-txt', langData[lang].save);
      updateText('btn-wa-txt', langData[lang].wa);
      updateText('btn-sms-txt', langData[lang].sms);
      updateText('btn-notify-txt', langData[lang].notify);
      updateText('txt-footer', langData[lang].footer);
    }

    function normalizePhone(raw) {
      let phone = (raw || '').trim().replace(/\s+/g, '');
      if (phone.startsWith('0')) phone = '94' + phone.substring(1);
      return phone;
    }

    document.addEventListener('click', function (e) {
      if (e.target.closest('.btn') || e.target.tagName === 'BUTTON') {
        if (navigator.vibrate) navigator.vibrate(40);
      }
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW Fail', err));
      });
    }

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('install-banner').style.display = 'flex';
    });

    function handleInstallClick() {
      const ua = window.navigator.userAgent.toLowerCase();
      const isIos = /iphone|ipad|ipod/.test(ua);

      if (isIos) {
        const container = document.getElementById('ios-steps-container');
        const isChromeIos = /crios/.test(ua);
        let stepsHtml = '';

        if (isChromeIos) {
          stepsHtml = `
            <p style="opacity: 0.9; margin-bottom: 15px;">Chrome හරහා Shortcut එකක් සාදාගන්න:</p>
            <div class="instruction-step">1️⃣ ඉහළ දකුණු කෙළවරේ ඇති <span class="highlight-gold">Share</span> බොත්තම ඔබන්න.</div>
            <div class="instruction-step">2️⃣ මඳක් පහළට ගොස් <span class="highlight-gold">"Add to Home Screen"</span> යන්න තෝරන්න.</div>
            <div class="instruction-step">3️⃣ පසුව <span class="highlight-gold">Add</span> බොත්තම ඔබන්න.</div>
          `;
        } else {
          stepsHtml = `
            <p style="opacity: 0.9; margin-bottom: 15px;">Safari හරහා Shortcut එකක් සාදාගන්න:</p>
            <div class="instruction-step">1️⃣ පහළ ඇති <span class="highlight-gold">Share</span> බොත්තම ඔබන්න.</div>
            <div class="instruction-step">2️⃣ මඳක් පහළට ගොස් <span class="highlight-gold">"Add to Home Screen"</span> යන්න තෝරන්න.</div>
            <div class="instruction-step">3️⃣ පසුව <span class="highlight-gold">Add</span> බොත්තම ඔබන්න.</div>
          `;
        }

        container.innerHTML = stepsHtml;
        document.getElementById('ios-instructions').style.display = 'flex';
      } else if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then((choice) => {
          if (choice.outcome === 'accepted') {
            document.getElementById('install-banner').style.display = 'none';
          }
          deferredPrompt = null;
        });
      } else {
        alert("Please use your browser's menu to 'Add to Home Screen'.");
      }
    }

    function saveContact() {
      const num = document.getElementById('phone').value.trim();
      const uName = document.getElementById('u-name').value.trim();

      if (num.length < 10) return alert(langData[currentLang].alert);

      let finalName;
      if (uName) {
        finalName = uName.includes('K-Win client') ? uName : `${uName} K-Win client`;
      } else {
        finalName = langData[currentLang].vcardName;
      }

      const vcard = `BEGIN:VCARD\nVERSION:3.0\nFN:${finalName}\nTEL;TYPE=CELL:${num}\nEND:VCARD`;
      const blob = new Blob([vcard], { type: 'text/vcard' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `KWin_${num}.vcf`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function sendAction(type) {
      let num = document.getElementById('phone').value.trim();
      if (num.length < 10) return alert(langData[currentLang].alert);

      num = normalizePhone(num);
      const link = 'https://kwinproduction.github.io/K-Win-Card/';
      const msg = `${langData[currentLang].smsMsg} ${link}`;

      if (type === 'wa') {
        window.location.href = `https://wa.me/${num}?text=${encodeURIComponent(msg)}`;
      } else {
        const sep = /iphone|ipad|ipod/i.test(navigator.userAgent) ? '&' : '?';
        window.location.href = `sms:+${num}${sep}body=${encodeURIComponent(msg)}`;
      }
    }

    function openNotificationPopup() {
      document.getElementById('notification-popup').style.display = 'flex';
      document.getElementById('notify-message').focus();
    }

    function closeNotificationPopup() {
      document.getElementById('notification-popup').style.display = 'none';
    }

    async function sendNotification() {
      const phoneRaw = document.getElementById('phone').value.trim();
      const name = document.getElementById('u-name').value.trim();
      const message = document.getElementById('notify-message').value.trim();

      if (message === '') {
        alert('Enter message');
        return;
      }

      const phone = phoneRaw ? normalizePhone(phoneRaw) : '';

      if (!supabaseClient) {
        alert('Supabase is not ready');
        return;
      }

      const { data, error } = await supabaseClient
        .from('notifications')
        .insert([
          {
            phone: phone,
            name: name,
            message: message,
            created_at: new Date().toISOString()
          }
        ]);

      if (error) {
        console.error(error);
        alert(error.message || 'Failed');
        return;
      }

      if ('Notification' in window && Notification.permission !== 'granted') {
        try {
          await Notification.requestPermission();
        } catch (err) {
          console.log(err);
        }
      }

      if ('Notification' in window && Notification.permission === 'granted') {
        navigator.serviceWorker.getRegistration().then((reg) => {
          if (reg) {
            reg.showNotification('K-Win Notification', {
              body: message,
              icon: 'https://raw.githubusercontent.com/kwinproduction/K-Win-Ecard/main/logo.jpeg',
              badge: 'https://raw.githubusercontent.com/kwinproduction/K-Win-Ecard/main/logo.jpeg',
              vibrate: [300, 100, 300],
