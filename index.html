    :root {
      --accent: #ffffff;
      --bg: #000000;
      --card: #121212;
      --text: #ffffff;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: fixed;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', Roboto, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: env(safe-area-inset-top) 15px env(safe-area-inset-bottom) 15px;
    }

    #install-banner {
      display: none;
      width: 100%;
      background: var(--accent);
      color: #000;
      padding: 12px 20px;
      justify-content: space-between;
      align-items: center;
      font-weight: bold;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 9999;
      box-shadow: 0 4px 15px rgba(255,255,255,0.1);
    }

    #install-banner button {
      background: #000;
      color: var(--accent);
      border: none;
      padding: 8px 18px;
      border-radius: 10px;
      font-weight: 900;
      cursor: pointer;
    }

    #ios-instructions {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.98);
      z-index: 100000;
      color: white;
      padding: 30px;
      text-align: center;
      justify-content: center;
      flex-direction: column;
      align-items: center;
      backdrop-filter: blur(20px);
    }

    .instruction-step {
      background: rgba(255, 255, 255, 0.05);
      padding: 18px;
      border-radius: 15px;
      margin: 12px 0;
      width: 100%;
      font-size: 15px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .highlight-gold {
      color: #ffcc00;
      font-weight: bold;
    }

    .lang-bar {
      display: flex;
      gap: 8px;
      margin-top: 60px;
      background: #111;
      padding: 5px;
      border-radius: 25px;
      border: 1px solid #222;
    }

    .lang-btn {
      background: transparent;
      color: #888;
      border: none;
      padding: 8px 15px;
      border-radius: 20px;
      font-size: 0.75rem;
      cursor: pointer;
      font-weight: bold;
    }

    .lang-btn.active {
      background: var(--accent);
      color: #000;
    }

    .header {
      text-align: center;
      margin-top: 10px;
    }

    .logo-circle {
      width: 85px;
      height: 85px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      padding: 4px;
      margin: 0 auto 10px;
      overflow: hidden;
    }

    .logo-circle img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }

    h1 {
      font-size: 1.4rem;
      letter-spacing: 2px;
      color: var(--accent);
      font-weight: 900;
    }

    .container {
      width: 100%;
      max-width: 380px;
      flex-grow: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: var(--card);
      border-radius: 30px;
      padding: 25px;
      border: 1px solid #222;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      width: 100%;
      max-height: 95vh;
      overflow-y: auto;
      scrollbar-width: none;
    }

    .card::-webkit-scrollbar {
      display: none;
    }

    .input-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      font-size: 0.7rem;
      color: var(--accent);
      font-weight: bold;
      margin-bottom: 8px;
      text-align: center;
      opacity: 0.8;
    }

    input, textarea {
      width: 100%;
      background: #000;
      border: 1px solid #333;
      border-radius: 15px;
      color: var(--accent);
      padding: 12px;
      font-size: 1.1rem;
      font-weight: bold;
      text-align: center;
      outline: none;
    }

    input#phone {
      font-size: 1.4rem;
      letter-spacing: 2px;
    }

    .btn-stack {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 10px;
    }

    .btn {
      width: 100%;
      padding: 15px;
      border-radius: 15px;
      border: none;
      font-size: 0.9rem;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      transition: 0.1s;
    }

    .btn-save { background: var(--accent); color: #000; }
    .btn-wa { background: #25D366; color: #fff; }
    .btn-sms { background: #1d9bf0; color: #fff; }

    .notify-btn {
      background: #007bff;
      color: #fff;
      border: none;
      padding: 15px;
      border-radius: 15px;
      font-size: 0.9rem;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      transition: 0.1s;
      box-shadow: 0 4px 12px rgba(0,0,0,.2);
    }

    .btn:active, .notify-btn:active {
      transform: scale(0.95);
    }

    .footer {
      margin-top: 20px;
      font-size: 0.6rem;
      opacity: 0.4;
      text-align: center;
      color: #fff;
      padding-bottom: 10px;
      width: 100%;
    }

    .popup {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.85);
      justify-content: center;
      align-items: center;
      z-index: 9999;
      backdrop-filter: blur(5px);

    .popup-content {
      width: 90%;
      max-width: 380px;
      background: var(--card);
      border: 1px solid #222;
      border-radius: 25px;
      padding: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,.5);
      animation: pop .25s ease;
    }

    @keyframes pop {
      from { transform: scale(.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .popup-content h2 {
      margin-top: 0;
      margin-bottom: 20px;
      text-align: center;
      color: var(--accent);
      font-weight: 900;
      font-size: 1.3rem;

      font-size: 0.95rem;
      outline: none;
      text-align: left;
    }

    .popup-content textarea {
      height: 120px;
      resize: none;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 10px;
    }

    .send-btn,
    .close-btn {
      flex: 1;
      border: none;
      padding: 14px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: bold;

    }

      color: white;
    }

      color: white;
    }

      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: #111;
      color: #fff;
      border: 1px solid #2b2b2b;
      padding: 14px 16px;
      border-radius: 16px;
      z-index: 999999;
      width: min(92vw, 380px);
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
      backdrop-filter: blur(8px);
    }

    function setLang(lang) {
      currentLang = lang;
      document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
      const activeBtn = document.getElementById('btn-' + lang);
      if (activeBtn) activeBtn.classList.add('active');

      const updateText = (id, text) => {
        const el = document.getElementById(id);
        if (el) el.innerText = text;
      };

      updateText('txt-install-msg', langData[lang].install);
      updateText('btn-install', langData[lang].installBtn);
      updateText('lbl-phone', langData[lang].label);
      updateText('lbl-name', langData[lang].nameLabel);
      updateText('btn-save-txt', langData[lang].save);
      updateText('btn-wa-txt', langData[lang].wa);
      updateText('btn-sms-txt', langData[lang].sms);
      updateText('txt-footer', langData[lang].footer);
      updateText('btn-notify-txt', langData[lang].notify);
      updateText('popup-title', langData[lang].notifyTitle);
      updateText('send-btn-txt', langData[lang].send);
      updateText('close-btn-txt', langData[lang].close);

      const titleInput = document.getElementById('title');
      if (titleInput) titleInput.placeholder = langData[lang].titlePlaceholder;

      const messageInput = document.getElementById('message');
      if (messageInput) messageInput.placeholder = langData[lang].notifyMessage;
    }

    function closePopup() {
      document.getElementById("popup").style.display = "none";
    }

    function showIncomingToast(title, message) {
      let box = document.getElementById("incomingToast");

      if (!box) {
        box = document.createElement("div");
        box.id = "incomingToast";
        document.body.appendChild(box);
      }

      box.innerHTML = `
        <div style="font-weight:800; margin-bottom:6px; color:#00f2ff;">${title || "K-Win Notification"}</div>
        <div style="font-size:14px; line-height:1.5;">${message || ""}</div>
      `;

      setTimeout(() => {
        if (box) box.remove();
      }, 4500);
    }

    function showBrowserNotification(title, message) {
      if (!("Notification" in window)) return;
      if (Notification.permission !== "granted") return;

      const n = new Notification(title || "K-Win Notification", {
        body: message || "",
        icon: "https://raw.githubusercontent.com/kwinproduction/K-Win-Ecard/main/logo.jpeg",
        badge: "https://raw.githubusercontent.com/kwinproduction/K-Win-Ecard/main/logo.jpeg"
      });

      n.onclick = () => {
        window.focus();
        n.close();
      };
    }

    async function askNotificationPermission() {
      if (!("Notification" in window)) return;

      if (Notification.permission === "default") {
        try {
          await Notification.requestPermission();
        } catch (e) {}
      }
    }

    async function sendNotification() {
      const title = document.getElementById("title").value.trim();
      const message = document.getElementById("message").value.trim();

      if (!message) {
        alert(
          currentLang === "si"
            ? "කරුණාකර පණිවිඩයක් ඇතුළත් කරන්න"
            : currentLang === "ta"
            ? "செய்தியை உள்ளிடவும்"
            : "Enter a message"
        );
        return;
      }

      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/notifications`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "apikey": SUPABASE_ANON_KEY,
            "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
            "Prefer": "return=representation"
          },
          body: JSON.stringify({
            title: title || "K-Win Notification",
            message: message,
            created_at: new Date().toISOString()
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(JSON.stringify(data));
        }

        alert(
          currentLang === "si"
            ? "දැනුම්දීම සාර්ථකව යවන ලදී!"
            : currentLang === "ta"
            ? "அறிவிப்பு வெற்றிகரமாக அனுப்பப்பட்டது!"
            : "Notification Sent Successfully!"
        );

        document.getElementById("title").value = "";
        document.getElementById("message").value = "";
        closePopup();

      } catch (err) {
        console.error("Notification Error:", err);
        alert("Failed: " + err.message);
      }
    }

    function startRealtimeListener() {
      supabaseClient
        .channel("realtime-notifications")
        .on(
          "postgres_changes",
          {
            event: "INSERT",
            schema: "public",
            table: "notifications"
          },
          (payload) => {
            const row = payload.new || {};
            const title = row.title || "K-Win Notification";
            const message = row.message || "";

            showIncomingToast(title, message);
            showBrowserNotification(title, message);
          }
        )
        .subscribe((status) => {
          console.log("Supabase status:", status);
        });
    }

    function saveContact() {
      const num = document.getElementById('phone').value.trim();
      const uName = document.getElementById('u-name').value.trim();

      if (num.length < 10) return alert(langData[currentLang].alert);

      const clientText = "K-Win Client";
      const finalName = uName
        ? (uName.includes(clientText) ? uName : `${uName} - ${clientText}`)
        : clientText;

      const vcard = `BEGIN:VCARD
VERSION:3.0
FN:${finalName}
TEL;TYPE=CELL:${num}
END:VCARD`;

      const blob = new Blob([vcard], { type: "text/vcard" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement('a');
      a.href = url;
      a.download = `KWin_${num}.vcf`;
      document.body.appendChild(a);
      a.click();
      a.remove();

      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    // වෙනස් කරන ලදි: මෙහි encodeURIComponent භාවිතයෙන් පණිවිඩය සකසා ඇත
    function sendAction(type) {
      let num = document.getElementById('phone').value.trim();
      if (num.length < 10) return alert(langData[currentLang].alert);

      if (num.startsWith('0')) num = '94' + num.substring(1);

      const link = "https://kwinproduction.github.io/K-Win-Card/";
      const msg = `${langData[currentLang].smsMsg} ${link}`;

      if (type === 'wa') {
        window.location.href = `https://wa.me/${num}?text=${encodeURIComponent(msg)}`;
      } else {
        const sep = (/iphone|ipad|ipod/i).test(navigator.userAgent) ? '&' : '?';
        window.location.href = `sms:+${num}${sep}body=${encodeURIComponent(msg)}`;
      }
    }

    function handleInstallClick() {
      const ua = window.navigator.userAgent.toLowerCase();
      const isIos = /iphone|ipad|ipod/.test(ua);

      if (isIos) {
        const container = document.getElementById('ios-steps-container');
        const isChromeIos = /crios/.test(ua);
        let stepsHtml = '';

        if (isChromeIos) {
          stepsHtml = `
            <p style="opacity: 0.9; margin-bottom: 15px;">Chrome හරහා Shortcut එකක් සාදාගන්න:</p>
            <div class="instruction-step">1️⃣ ඉහළ දකුණු කෙළවරේ ඇති <span class="highlight-gold">Share</span> බොත්තම ඔබන්න.</div>
            <div class="instruction-step">2️⃣ මඳක් පහළට ගොස් <span class="highlight-gold">"Add to Home Screen"</span> යන්න තෝරන්න.</div>
            <div class="instruction-step">3️⃣ පසුව <span class="highlight-gold">Add</span> බොත්තම ඔබන්න.</div>
          `;
        } else {
          stepsHtml = `
            <p style="opacity: 0.9; margin-bottom: 15px;">Safari හරහා Shortcut එකක් සාදාගන්න:</p>
            <div class="instruction-step">1️⃣ පහළ ඇති <span class="highlight-gold">Share</span> බොත්තම ඔබන්න.</div>
            <div class="instruction-step">2️⃣ මඳක් පහළට ගොස් <span class="highlight-gold">"Add to Home Screen"</span> යන්න තෝරන්න.</div>
            <div class="instruction-step">3️⃣ පසුව <span class="highlight-gold">Add</span> බොත්තම ඔබන්න.</div>
          `;
        }

        container.innerHTML = stepsHtml;
        document.getElementById('ios-instructions').style.display = 'flex';
      } else if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then((choice) => {
          if (choice.outcome === 'accepted') {
            document.getElementById('install-banner').style.display = 'none';
          }
          deferredPrompt = null;
        });
      } else {
        alert("Please use your browser's menu to 'Add to Home Screen'.");
      }
    }

    document.addEventListener('click', function(e) {
      if (e.target.closest('.btn') || e.target.closest('.notify-btn') || e.target.tagName === 'BUTTON') {
        if (navigator.vibrate) navigator.vibrate(40);
      }
    });

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('install-banner').style.display = 'flex';
    });

    document.getElementById("openPopup").addEventListener("click", () => {
      document.getElementById("popup").style.display = "flex";
    });

    document.getElementById('u-name').addEventListener('blur', function() {
      let currentName = this.value.trim();
      if (currentName !== "" && !currentName.includes("K-Win Client")) {
        this.value = currentName + " - K-Win Client";
      }
    });

    window.addEventListener('DOMContentLoaded', async () => {
      setLang('en');

      const isStandalone =
        window.navigator.standalone === true ||
        window.matchMedia('(display-mode: standalone)').matches;

      const isIos = /iphone|ipad|ipod/.test(window.navigator.userAgent.toLowerCase());

      if (!isStandalone && isIos) {
        document.getElementById('install-banner').style.display = 'flex';
      }

      await askNotificationPermission();
      startRealtimeListener();
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .catch(err => console.log('SW Fail', err));
      });
    }
  </script>
</body>
</html>
