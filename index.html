<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>K-Win</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="data:application/manifest+json;base64,eyJuYW1lIjoiS1dpbiIsInNob3J0X25hbWUiOiJLLVdpbiIsInN0YXJ0X3VybCI6ImluZGV4Lmh0bWwiLCJkaXNwbGF5Ijoic3RhbmRhbG9uZSIsImJhY2tncm91bmRfY29sb3ciOiIjMDAwMDAwIiwidGhlbWVfY29sb3ciOiIjZmZmZmZmIiwib3JpZW50YXRpb24iOiJwb3J0cmFpdCIsImljb25zIjpbeyJzcmMiOiJodHRwczovL3Jhdy5naXRodWJ1c2VyY29udGVudC5jb20va3dpbnByb2R1Y3Rpb24vSy1XaW4tRWNhcmQvbWFpbi9sb2dvLmpwZWciLCJzaXplcyI6IjUxMng1MTIiLCJ0eXBlIjoiaW1hZ2UvanBlZyIsInB1cnBvc2UiOiJhbnkgbWFza2FibGUifV19">
    <link rel="icon" type="image/jpeg" href="https://raw.githubusercontent.com/kwinproduction/K-Win-Ecard/main/logo.jpeg">
    <meta name="theme-color" content="#ffffff">    
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/kwinproduction/K-Win-Ecard/main/logo.jpeg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root { --accent: #ffffff; --bg: #000000; --card: #121212; --text: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { height: 100%; width: 100%; background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', Roboto, sans-serif; overflow-x: hidden; }
        body { display: flex; flex-direction: column; align-items: center; padding: env(safe-area-inset-top) 15px env(safe-area-inset-bottom) 15px; }

        /* PWA Install Banner */
        #install-banner { 
            display: none; width: 100%; background: var(--accent); color: #000; 
            padding: 12px 20px; justify-content: space-between; align-items: center; 
            font-weight: bold; position: fixed; top: 0; z-index: 9999; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        #install-banner button { 
            background: #000; color: var(--accent); border: none; 
            padding: 8px 15px; border-radius: 8px; font-weight: 900; cursor: pointer;
        }

        /* iOS Profile Instruction Overlay */
        #ios-profile-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #050a14; z-index: 100000; color: white; padding: 30px;
            box-sizing: border-box; text-align: center; justify-content: center; flex-direction: column; align-items: center;
        }
        .instruction-step { 
            background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 15px; 
            margin: 10px 0; width: 100%; font-size: 14px; border: 1px solid rgba(255, 255, 255, 0.1); 
        }
        .highlight-gold { color: #ffcc00; font-weight: bold; }

        /* UI Elements */
        .lang-bar { display: flex; gap: 8px; margin-top: 70px; background: #111; padding: 5px; border-radius: 25px; border: 1px solid #222; }
        .lang-btn { background: transparent; color: #888; border: none; padding: 8px 15px; border-radius: 20px; font-size: 0.75rem; cursor: pointer; font-weight: bold; }
        .lang-btn.active { background: var(--accent); color: #000; }

        .header { text-align: center; margin-top: 20px; }
        .logo-circle { width: 90px; height: 90px; border-radius: 50%; border: 2px solid var(--accent); padding: 4px; margin: 0 auto 10px; overflow: hidden; }
        .logo-circle img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        h1 { font-size: 1.5rem; letter-spacing: 2px; color: var(--accent); font-weight: 900; }

        .container { width: 100%; max-width: 380px; margin-top: 20px; }
        .card { background: var(--card); border-radius: 25px; padding: 25px; border: 1px solid #222; }

        .input-group { margin-bottom: 18px; }
        label { display: block; font-size: 0.7rem; color: var(--accent); font-weight: bold; margin-bottom: 8px; text-align: center; opacity: 0.8; }
        input { width: 100%; background: #000; border: 1px solid #333; border-radius: 15px; color: var(--accent); padding: 14px; font-size: 1.1rem; font-weight: bold; text-align: center; }
        input#phone { font-size: 1.4rem; letter-spacing: 1px; }

        .btn { width: 100%; padding: 16px; border-radius: 15px; border: none; font-size: 0.9rem; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 12px; cursor: pointer; transition: 0.2s; }
        .btn-save { background: var(--accent); color: #000; }
        .btn-wa { background: #25D366; color: #fff; }
        .btn-sms { background: #1d9bf0; color: #fff; }
        .btn:active { transform: scale(0.96); }

        .footer { margin-top: 30px; padding-bottom: 20px; font-size: 0.65rem; opacity: 0.4; text-align: center; width: 100%; }
    </style>
</head>
<body>

    <!-- Installation Banner -->
    <div id="install-banner">
        <span id="txt-install-msg">📲 Install K-Win App</span>
        <button id="btn-install" onclick="handleInstallClick()">INSTALL</button>
    </div>

    <!-- Apple Profile Instructions -->
    <div id="ios-profile-overlay">
        <h2 style="color: #ffcc00; margin-bottom: 10px;">K-Win Installer (Apple)</h2>
        <p style="opacity: 0.8; font-size: 14px; margin-bottom: 15px;">App එක Install කිරීමට පහත පියවර අනුගමනය කරන්න:</p>
        <div class="instruction-step">1️⃣ දැන් Settings (සැකසුම්) වෙත යන්න.</div>
        <div class="instruction-step">2️⃣ <span class="highlight-gold">"Profile Downloaded"</span> පණිවිඩය ක්ලික් කරන්න.</div>
        <div class="instruction-step">3️⃣ එහි ඉහළ ඇති <span class="highlight-gold">Install</span> බොත්තම ඔබන්න.</div>
        <button class="btn btn-save" style="margin-top: 20px; width: auto; padding: 10px 30px;" onclick="document.getElementById('ios-profile-overlay').style.display='none'">සම්පූර්ණයි ✅</button>
    </div>

    <div class="lang-bar">
        <button id="btn-en" class="lang-btn active" onclick="setLang('en')">English</button>
        <button id="btn-si" class="lang-btn" onclick="setLang('si')">සිංහල</button>
        <button id="btn-ta" class="lang-btn" onclick="setLang('ta')">தமிழ்</button>
    </div>

    <div class="header">
        <div class="logo-circle">
            <img src="https://raw.githubusercontent.com/kwinproduction/K-Win-Ecard/main/logo.jpeg" alt="Logo">
        </div>
        <h1>Kind Win</h1>
        <p id="txt-subtitle" style="font-size: 0.6rem; letter-spacing: 3px; opacity: 0.6; text-transform: uppercase;">Management System</p>
    </div>

    <div class="container">
        <div class="card">
            <div class="input-group">
                <label id="lbl-phone">ENTER MOBILE NUMBER</label>
                <input type="tel" id="phone" placeholder="07XXXXXXXX" maxlength="10">
            </div>
            <div class="input-group">
                <label id="lbl-name">ENTER YOUR NAME</label>
                <input type="text" id="u-name" placeholder="Full Name">
            </div>
            
            <button class="btn btn-save" onclick="saveContact()">
                <span id="btn-save-txt">👤 Save to Contacts</span>
            </button>
            <button class="btn btn-wa" onclick="sendAction('wa')">
                <span id="btn-wa-txt">💬 Send WhatsApp</span>
            </button>
            <button class="btn btn-sms" onclick="sendAction('sms')">
                <span id="btn-sms-txt">✉️ Send SMS</span>
            </button>
        </div>
    </div>

    <div class="footer" id="txt-footer">Powered by K-Win | Design by Janith Didula</div>

    <script>
        const langData = {
            en: {
                install: "📲 Install K-Win App", installBtn: "INSTALL", subtitle: "Management System",
                label: "ENTER MOBILE NUMBER", nameLabel: "ENTER YOUR NAME", save: "👤 Save to Contacts", 
                wa: "💬 Send WhatsApp", sms: "✉️ Send SMS", alert: "Please enter a valid number",
                vcardName: "K-Win Client", smsMsg: "Get your K-Win Digital Card here:",
                footer: "Powered by K-Win | Design by Janith Didula"
            },
            si: {
                install: "📲 K-Win ඇප් එක ලබාගන්න", installBtn: "පිහිටුවන්න", subtitle: "කළමනාකරණ පද්ධතිය",
                label: "දුරකථන අංකය ඇතුළත් කරන්න", nameLabel: "ඔබේ නම ඇතුළත් කරන්න", save: "👤 සම්බන්ධතාවලට එක් කරන්න", 
                wa: "💬 WhatsApp පණිවිඩයක් යවන්න", sms: "✉️ SMS එකක් යවන්න", alert: "කරුණාකර නිවැරදි අංකයක් ඇතුළත් කරන්න",
                vcardName: "K-Win සේවාලාභියා", smsMsg: "ඔබේ K-Win Digital Card එක මෙතැනින් ලබාගන්න:",
                footer: "K-Win වෙතින් | ජනිත් දිදුලගේ නිර්මාණයකි"
            },
            ta: {
                install: "📲 K-Win செயலியை நிறுவவும்", installBtn: "நிறுவவும்", subtitle: "மேலாண்மை அமைப்பு",
                label: "கைபேசி எண்ணை உள்ளிடவும்", nameLabel: "உங்கள் பெயரை உள்ளிடவும்", save: "👤 தொடர்புகளில் சேமிக்கவும்", 
                wa: "💬 WhatsApp அனுப்பவும்", sms: "✉️ SMS அனுப்பவும்", alert: "செல்லுபடியாகும் எண்ணை உள்ளிடவும்",
                vcardName: "K-Win கிளையண்ட்", smsMsg: "உங்கள் K-Win டிஜிட்டல் கார்டை இங்கே பெறுங்கள்:",
                footer: "K-Win மூலம் இயக்கப்படுகிறது | வடிவமைப்பு: ஜனிත් திதுல"
            }
        };

        let currentLang = 'en';
        let deferredPrompt;

        function setLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + lang).classList.add('active');
            
            document.getElementById('txt-install-msg').innerText = langData[lang].install;
            document.getElementById('btn-install').innerText = langData[lang].installBtn;
            document.getElementById('txt-subtitle').innerText = langData[lang].subtitle;
            document.getElementById('lbl-phone').innerText = langData[lang].label;
            document.getElementById('lbl-name').innerText = langData[lang].nameLabel;
            document.getElementById('btn-save-txt').innerText = langData[lang].save;
            document.getElementById('btn-wa-txt').innerText = langData[lang].wa;
            document.getElementById('btn-sms-txt').innerText = langData[lang].sms;
            document.getElementById('txt-footer').innerText = langData[lang].footer;
        }

        // --- PWA & Installation Logic ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW Fail', err));
            });
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-banner').style.display = 'flex';
        });

        async function handleInstallClick() {
            const isIos = /iphone|ipad|ipod/.test(window.navigator.userAgent.toLowerCase());

            if (isIos) {
                // Download iOS Configuration Profile
                const profileXml = `<?xml version="1.0" encoding="UTF-8"?>
                <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
                <plist version="1.0">
                <dict>
                    <key>PayloadContent</key>
                    <array>
                        <dict>
                            <key>FullScreen</key><true/>
                            <key>Icon</key><data></data>
                            <key>IsRemovable</key><true/>
                            <key>Label</key><string>K-Win</string>
                            <key>PayloadType</key><string>com.apple.webClip.managed</string>
                            <key>PayloadUUID</key><string>123e4567-e89b-12d3-a456-426614174000</string>
                            <key>PayloadVersion</key><integer>1</integer>
                            <key>URL</key><string>${window.location.href}</string>
                        </dict>
                    </array>
                    <key>PayloadDisplayName</key><string>K-Win Installer</string>
                    <key>PayloadIdentifier</key><string>com.kwin.installer</string>
                    <key>PayloadType</key><string>Configuration</string>
                    <key>PayloadUUID</key><string>123e4567-e89b-12d3-a456-426614174001</string>
                    <key>PayloadVersion</key><integer>1</integer>
                </dict>
                </plist>`;
                const blob = new Blob([profileXml], { type: 'application/x-apple-aspen-config' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'K-Win.mobileconfig';
                a.click();
                document.getElementById('ios-profile-overlay').style.display = 'flex';
            } else if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') document.getElementById('install-banner').style.display = 'none';
                deferredPrompt = null;
            } else {
                alert("Please use the 'Add to Home Screen' option in your browser menu.");
            }
        }

        // --- Core Functions ---
        function saveContact() {
            const num = document.getElementById('phone').value.trim();
            const uName = document.getElementById('u-name').value.trim();
            if (num.length < 10) return alert(langData[currentLang].alert);
            const finalName = uName || langData[currentLang].vcardName;
            const vcard = `BEGIN:VCARD\nVERSION:3.0\nFN:${finalName}\nTEL;TYPE=CELL:${num}\nEND:VCARD`;
            const blob = new Blob([vcard], { type: "text/vcard" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `KWin_${num}.vcf`;
            a.click();
        }

        function sendAction(type) {
            let num = document.getElementById('phone').value.trim();
            if (num.length < 10) return alert(langData[currentLang].alert);
            if (num.startsWith('0')) num = '94' + num.substring(1);
            const link = "https://kwinproduction.github.io/K-Win-Card/";
            const msg = `${langData[currentLang].smsMsg} ${link}`;
            if (type === 'wa') {
                window.location.href = `https://wa.me/${num}?text=${encodeURIComponent(msg)}`;
            } else {
                const sep = (navigator.userAgent.match(/iPhone|iPad|iPod/i)) ? '&' : '?';
                window.location.href = `sms:+${num}${sep}body=${encodeURIComponent(msg)}`;
            }
        }

        window.onload = () => {
            setLang('en');
            // Show banner for iPhone if not already installed
            const isIos = /iphone|ipad|ipod/.test(window.navigator.userAgent.toLowerCase());
            const isStandalone = window.navigator.standalone === true;
            if (isIos && !isStandalone) {
                document.getElementById('install-banner').style.display = 'flex';
            }
        };
    </script>
</body>
</html>
