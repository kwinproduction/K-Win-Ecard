<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>K-Win</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="data:application/manifest+json;base64,eyJuYW1lIjoiS1dpbiIsInNob3J0X25hbWUiOiJLLVdpbiIsInN0YXJ0X3VybCI6ImluZGV4Lmh0bWwiLCJkaXNwbGF5Ijoic3RhbmRhbG9uZSIsImJhY2tncm91bmRfY29sb3ciOiIjMDAwMDAwIiwidGhlbWVfY29sb3ciOiIjZmZmZmZmIiwib3JpZW50YXRpb24iOiJwb3J0cmFpdCIsImljb25zIjpbeyJzcmMiOiJodHRwczovL3Jhdy5naXRodWJ1c2VyY29udGVudC5jb20va3dpbnByb2R1Y3Rpb24vSy1XaW4tRWNhcmQvbWFpbi9sb2dvLmpwZWciLCJzaXplcyI6IjUxMng1MTIiLCJ0eXBlIjoiaW1hZ2UvanBlZyIsInB1cnBvc2UiOiJhbnkgbWFza2FibGUifV19">
    <link rel="icon" type="image/jpeg" href="https://raw.githubusercontent.com/kwinproduction/K-Win-Ecard/main/logo.jpeg">
    <meta name="theme-color" content="#ffffff">    

    <style>
        :root { 
    --accent: #ffffff; 
    --bg: #000000; /* True Black */
    --card: #121212; 
    --text: #ffffff;  
}

* { 
    box-sizing: border-box; 
    -webkit-tap-highlight-color: transparent; 
    outline: none; 
    margin: 0; 
    padding: 0;
}

body, html { 
    height: 100%; 
    width: 100%;
    overflow: hidden; 
    background-color: var(--bg); 
    color: var(--text); 
    font-family: 'Segoe UI', Roboto, sans-serif; 
}

body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between; 
    /* Mobile notch saha bottom bar walata ida thiyanna */
    padding: env(safe-area-inset-top) 15px env(safe-area-inset-bottom) 15px; 
}
        /* PWA Install Banner */
        #install-banner { 
            display: none; 
            width: 100%; background: var(--accent); color: #000; 
            padding: 12px 20px; justify-content: space-between; align-items: center; 
            font-weight: bold; position: fixed; top: 0; z-index: 9999; 
        }
        #install-banner button { 
            background: #000; color: var(--accent); border: none; 
            padding: 8px 15px; border-radius: 8px; font-weight: 900;
        }

        /* Lang Bar */
        .lang-bar { 
            display: flex; gap: 8px; margin-top: 60px; 
            background: #111; padding: 5px; border-radius: 25px; border: 1px solid #222; 
        }
        .lang-btn { 
            background: transparent; color: #888; border: none; padding: 8px 15px; 
            border-radius: 20px; font-size: 0.75rem; cursor: pointer; font-weight: bold; 
        }
        .lang-btn.active { background: var(--accent); color: #000; }

        .header { text-align: center; margin-top: 10px; }
        .logo-circle { 
            width: 90px; height: 90px; border-radius: 50%; 
            border: 2px solid var(--accent); padding: 4px; 
            margin: 0 auto 10px; overflow: hidden; 
        }
        .logo-circle img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        h1 { font-size: 1.5rem; letter-spacing: 2px; color: var(--accent); font-weight: 900; }
        .subtitle { font-size: 0.6rem; letter-spacing: 3px; opacity: 0.6; text-transform: uppercase; }

        .container { width: 90%; max-width: 380px; }
        .card { 
            background: var(--card); border-radius: 25px; padding: 20px; 
            border: 1px solid #222; 
        }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.7rem; color: var(--accent); font-weight: bold; margin-bottom: 8px; text-align: center; }
        
        input { 
            width: 100%; background: #000; border: 1px solid #333; 
            border-radius: 15px; color: var(--accent); padding: 12px; 
            font-size: 1.1rem; font-weight: bold; text-align: center; 
        }
        input#phone { font-size: 1.5rem; }

        .btn { 
            width: 100%; padding: 15px; border-radius: 15px; border: none; 
            font-size: 0.9rem; font-weight: bold; display: flex; align-items: center; 
            justify-content: center; gap: 10px; margin-bottom: 10px; cursor: pointer; 
        }
        .btn-save { background: var(--accent); color: #000; }
        .btn-wa { background: #25D366; color: #fff; }
        .btn-sms { background: #1d9bf0; color: #fff; }
        .btn:active { transform: scale(0.97); }

        .footer { padding-bottom: 15px; font-size: 0.65rem; opacity: 0.4; text-align: center; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="install-banner">
        <span id="txt-install-msg">📲 Install K-Win App</span>
        <button id="btn-install">INSTALL</button>
    </div>

<div id="ios-overlay" style="display: none; position: fixed; bottom: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 99999; align-items: flex-end; justify-content: center; backdrop-filter: blur(8px);">
    <div style="background: white; color: #111; width: 100%; max-width: 400px; padding: 30px 20px; border-radius: 30px 30px 0 0; text-align: center; animation: slideUp 0.4s ease-out;">
        <h3 style="margin: 0 0 15px 0;">iPhone එකට Install කරන්න 📲</h3>
        <p style="font-size: 15px; margin-bottom: 25px; line-height: 1.5;">
            පහළ තියෙන <b>Share</b> අයිකනය ඔබලා, <br>
            <b>'Add to Home Screen'</b> තෝරන්න.
        </p>
        <div style="background: #f0f0f0; padding: 15px; border-radius: 15px; display: inline-flex; align-items: center; gap: 15px;">
            <img src="https://cdn-icons-png.flaticon.com/512/1053/1053079.png" width="30">
            <span style="font-weight: bold;">➔</span>
            <img src="https://cdn-icons-png.flaticon.com/512/262/262038.png" width="30">
        </div>
        <button onclick="document.getElementById('ios-overlay').style.display='none'" style="display: block; width: 100%; margin-top: 25px; background: #007bff; color: white; border: none; padding: 15px; border-radius: 15px; font-weight: bold; cursor: pointer;">හරි, තේරුණා!</button>
    </div>
</div>
    <div class="lang-bar">
        <button id="btn-en" class="lang-btn active" onclick="setLang('en')">English</button>
        <button id="btn-si" class="lang-btn" onclick="setLang('si')">සිංහල</button>
        <button id="btn-ta" class="lang-btn" onclick="setLang('ta')">தமிழ்</button>
    </div>

    <div class="header">
        <div class="logo-circle">
            <img src="https://raw.githubusercontent.com/kwinproduction/K-Win-Ecard/main/logo.jpeg" alt="Logo">
        </div>
        <h1>Kind Win</h1>
    </div>
    <div class="container">
        <div class="card">
            <div class="input-group">
                <label id="lbl-phone">ENTER MOBILE NUMBER</label>
                <input type="tel" id="phone" placeholder="07XXXXXXXX" maxlength="10">
            </div>
            <div class="input-group">
                <label id="lbl-name">ENTER NAME</label>
                <input type="text" id="u-name" placeholder="Full Name">
            </div>
            <button class="btn btn-save" onclick="saveContact()">
                <span id="btn-save-txt">👤 Save to Contacts</span>
            </button>
            <button class="btn btn-wa" onclick="sendAction('wa')">
                <span id="btn-wa-txt">💬 Send WhatsApp</span>
            </button>
            <button class="btn btn-sms" onclick="sendAction('sms')">
                <span id="btn-sms-txt">✉️ Send SMS</span>
            </button>
        </div>
    </div>

    <div class="footer" id="txt-footer">Powered by K-Win | Design by Janith Didula</div>

    <script>
        const langData = {
            en: {
                install: "📲 Install K-Win App", installBtn: "INSTALL", subtitle: "Management System",
                label: "ENTER MOBILE NUMBER", nameLabel: "ENTER YOUR NAME", save: "👤 Save to Contacts", 
                wa: "💬 Send WhatsApp", sms: "✉️ Send SMS", alert: "Please enter a valid number",
                vcardName: "K-Win Client", smsMsg: "Get your K-Win Digital Card here:",
                footer: "Powered by K-Win | Design by Janith Didula"
            },
            si: {
                install: "📲 K-Win ඇප් එක ලබාගන්න", installBtn: "පිහිටුවන්න", subtitle: "කළමනාකරණ පද්ධතිය",
                label: "දුරකථන අංකය ඇතුළත් කරන්න", nameLabel: "ඔබේ නම ඇතුළත් කරන්න", save: "👤 සම්බන්ධතාවලට එක් කරන්න", 
                wa: "💬 WhatsApp පණිවිඩයක් යවන්න", sms: "✉️ SMS එකක් යවන්න", alert: "කරුණාකර නිවැරදි අංකයක් ඇතුළත් කරන්න",
                vcardName: "K-Win සේවාලාභියා", smsMsg: "ඔබේ K-Win Digital Card එක මෙතැනින් ලබාගන්න:",
                footer: "K-Win වෙතින් | ජනිත් දිදුලගේ නිර්මාණයකි"
            },
            ta: {
                install: "📲 K-Win செயலியை நிறுவவும்", installBtn: "நிறுவவும்", subtitle: "மேலாண்மை அமைப்பு",
                label: "கைபேசி எண்ணை உள்ளிடவும்", nameLabel: "உங்கள் பெயரை உள்ளிடவும்", save: "👤 தொடர்புகளில் சேமிக்கவும்", 
                wa: "💬 WhatsApp அனுப்பவும்", sms: "✉️ SMS அனுப்பவும்", alert: "செல்லுபடியாகும் எண்ணை உள்ளிடவும்",
                vcardName: "K-Win கிளையண்ட்", smsMsg: "உங்கள் K-Win டிஜிட்டல் கார்டை இங்கே பெறுங்கள்:",
                footer: "K-Win மூலம் இயக்கப்படுகிறது | வடிவமைப்பு: ஜனிත් திதுல"
            }
        };

        let currentLang = 'en';
        let deferredPrompt;
        const installBanner = document.getElementById('install-banner');

        function setLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + lang).classList.add('active');
            
            document.getElementById('txt-install-msg').innerText = langData[lang].install;
            document.getElementById('btn-install').innerText = langData[lang].installBtn;
            document.getElementById('txt-subtitle').innerText = langData[lang].subtitle;
            document.getElementById('lbl-phone').innerText = langData[lang].label;
            document.getElementById('lbl-name').innerText = langData[lang].nameLabel;
            document.getElementById('btn-save-txt').innerText = langData[lang].save;
            document.getElementById('btn-wa-txt').innerText = langData[lang].wa;
            document.getElementById('btn-sms-txt').innerText = langData[lang].sms;
            document.getElementById('txt-footer').innerText = langData[lang].footer;
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW Fail', err));
            });
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBanner.style.display = 'flex';
        });

        document.getElementById('btn-install').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') installBanner.style.display = 'none';
                deferredPrompt = null;
            }
        });

        function saveContact() {
            const num = document.getElementById('phone').value.trim();
            const uName = document.getElementById('u-name').value.trim();
            if (num.length < 10) return alert(langData[currentLang].alert);
            const finalName = uName || langData[currentLang].vcardName;
            const vcard = `BEGIN:VCARD\nVERSION:3.0\nFN:${finalName}\nTEL;TYPE=CELL:${num}\nEND:VCARD`;
            const blob = new Blob([vcard], { type: "text/vcard" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `KWin_${num}.vcf`;
            a.click();
        }

        function sendAction(type) {
            let num = document.getElementById('phone').value.trim();
            if (num.length < 10) return alert(langData[currentLang].alert);
            if (num.startsWith('0')) num = '94' + num.substring(1);
            const link = "https://kwinproduction.github.io/K-Win-Card/";
            const msg = `${langData[currentLang].smsMsg} ${link}`;
            if (type === 'wa') {
                window.location.href = `https://wa.me/${num}?text=${encodeURIComponent(msg)}`;
            } else {
                const sep = (navigator.userAgent.match(/iPhone|iPad|iPod/i)) ? '&' : '?';
                window.location.href = `sms:+${num}${sep}body=${encodeURIComponent(msg)}`;
            }
        }

        window.onload = () => setLang('en');
    </script>
</body>
</html>
